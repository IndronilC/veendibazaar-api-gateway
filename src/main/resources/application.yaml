server:
  port: 9090

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive   # 🔥 MUST for Gateway

  cloud:
    gateway:
      server:
        webflux:

          # 🔹 ROUTES
          routes:

            # ✅ TEST ROUTE (keep this for debugging)
            - id: test-route
              uri: https://postman-echo.com
              predicates:
                - Path=/test/**
              filters:
                - StripPrefix=1

#            # 🔐 AUTH SERVICE
#            - id: auth-service
#              uri: http://localhost:8081
#              predicates:
#                - Path=/api/v1/auth/**
#
#            # 👤 USER SERVICE
#            - id: user-service
#              uri: http://localhost:8082
#              predicates:
#                - Path=/api/v1/users/**

          # 🔹 Disable discovery for now (clean setup)
          discovery:
            locator:
              enabled: false

# 🔍 DEBUG LOGGING (VERY IMPORTANT FOR NOW)
debug: true

logging:
  level:
    root: INFO

    # Spring Boot auto-config insights
    org.springframework.boot.autoconfigure: DEBUG

    # Gateway internals
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: TRACE

    # WebFlux + request flow
    org.springframework.web: DEBUG
    reactor.netty: DEBUG