server:
  port: 9090

spring:
  application:
    name: veendibazaar-api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:

          # 🔹 ROUTES
          routes:

            # ✅ TEST ROUTE
            - id: test-route
              uri: https://postman-echo.com
              predicates:
                - Path=/test/**
              filters:
                - StripPrefix=1

            # 🔐 AUTH SERVICE
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - StripPrefix=0

            # 👤 USER SERVICE
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/users/**
              filters:
                - StripPrefix=0

          # 🔹 CORS CONFIGURATION (Angular fix)
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:4200"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          # 🔹 Disable discovery for now
          discovery:
            locator:
              enabled: false

# 🔍 DEBUG CONFIG
debug: true

logging:
  level:
    root: INFO
    org.springframework.boot.autoconfigure: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: TRACE
    org.springframework.web: DEBUG
    reactor.netty: DEBUG